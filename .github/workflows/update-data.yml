name: Update League Data

on:
  # Run every Tuesday at 8 AM UTC (during season, after Monday Night Football)
  schedule:
    - cron: '0 8 * * 2'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year to fetch (leave blank for current)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install espn-api

      - name: Fetch latest league data
        env:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            python fetch.py --year ${{ github.event.inputs.year }}
          else
            python fetch.py
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ data.json
          git diff --cached --quiet || git commit -m "Update league data [auto]"
          git push
