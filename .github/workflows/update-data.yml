name: Update League Data

on:
  # Run every Tuesday at 8 AM UTC (during season, after Monday Night Football),
  # but ONLY during fantasy season — months 9, 10, 11, 12 (Sep–Dec) and 1, 2 (Jan–Feb).
  schedule:
    - cron: '0 8 * 9-12,1-2 2'
  # Allow manual trigger from GitHub UI (works year-round, regardless of month)
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year to fetch (leave blank for current)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install espn-api

      - name: Fetch latest league data
        env:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID:    ${{ secrets.SWID }}
          # YEAR comes from the repo secret. If you trigger the workflow
          # manually with a `year` input, that overrides the secret.
          YEAR:    ${{ github.event.inputs.year != '' && github.event.inputs.year || secrets.YEAR }}
        run: |
          if [ -z "$YEAR" ]; then
            echo "::error::YEAR is not set. Add it as a repo secret (Settings → Secrets and variables → Actions → New repository secret), or pass it as a manual input."
            exit 1
          fi
          python fetch.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ data.json
          # Include the run date (UTC) in the commit message
          COMMIT_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          git diff --cached --quiet || git commit -m "Update league data [auto] — $COMMIT_DATE"
          git push
